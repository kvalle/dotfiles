# Kitty Configuration
# Docs: https://sw.kovidgoyal.net/kitty/conf.html

# Font
font_family      Monaspace Neon
bold_font        Monaspace Neon Bold
italic_font      Monaspace Neon Italic
bold_italic_font Monaspace Neon Bold Italic
font_size        18

# Window
window_padding_left   12
window_padding_right  12
window_padding_top    8
window_padding_bottom 8
inactive_text_alpha   0.7

# macOS options
macos_option_as_alt yes
macos_titlebar_color background

# Cursor
cursor_shape      block
cursor_blink_interval 0

# Mouse
mouse_hide_wait   0
copy_on_select    clipboard

# Bell
enable_audio_bell no

# Scrollback
scrollback_lines  10000
scrollback_pager  bat --paging=always --style=plain

# URLs
open_url_with default

# Theme — TokyoNight
include themes/tokyonight.conf

# Tabs
tab_bar_style     powerline
tab_powerline_style slanted
map cmd+t          new_tab
map cmd+w          close_window
map cmd+shift+left    previous_tab
map cmd+shift+right   next_tab
map cmd+1          goto_tab 1
map cmd+2          goto_tab 2
map cmd+3          goto_tab 3
map cmd+4          goto_tab 4
map cmd+5          goto_tab 5
map cmd+6          goto_tab 6
map cmd+7          goto_tab 7
map cmd+8          goto_tab 8
map cmd+9          goto_tab 9

# Splits
map cmd+d          launch --location=hsplit
map cmd+shift+d    launch --location=vsplit
map cmd+alt+left   neighboring_window left
map cmd+alt+right  neighboring_window right
map cmd+alt+up     neighboring_window up
map cmd+alt+down   neighboring_window down

# Font size (override Kitty's default ±2 to match Ghostty's ±1)
map cmd+=          change_font_size all +1.0
map cmd+-          change_font_size all -1.0
map cmd+0          change_font_size all 0
