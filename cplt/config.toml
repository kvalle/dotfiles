# cplt global config — AI agent sandbox
# Docs: https://github.com/navikt/cplt/blob/main/docs/configuration.md

[sandbox]
agent = "opencode"
quiet = true
yes = true
allow_gpg_signing = false
allow_cache_exec = ["gradle"]

# ~/dotfiles/git er symlinket fra ~/.config/git — cplt må kunne lese originalen
# ~/dotfiles/ai/opencode/opencode.jsonc er symlinket fra ~/.config/opencode/opencode.jsonc
[allow]
read = ["~/dotfiles/git", "~/dotfiles/ai/opencode"]

[proxy]
enabled = true
log_level = "blocked"
log_file = "~/.config/cplt/proxy.log"

[gh_guard]
enabled = true
mode = "block"

[git_guard]
enabled = true
protect_default_branch_only = true
