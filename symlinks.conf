# Symlink-konfigurasjon for dotfiles
# Format: type  kilde  mål
#   d = katalog-symlink (rm -rf + ln -s)
#   f = fil-symlink (rm -f + ln -s)
# mkdir -p kjøres alltid for forelder-katalogen til målet.
# Alle kilde-stier er relative til ~/dotfiles/

# Zsh
f  zprofile                   ~/.zprofile
f  zshrc                      ~/.zshrc

# Git (config, ignore, message, allowed_signers)
d  git                        ~/.config/git

# Språk
f  python/pythonrc.py         ~/.config/python/pythonrc.py
f  ghci/ghci.conf             ~/.config/ghci/ghci.conf

# Terminal og prompt
f  starship.toml              ~/.config/starship.toml
d  ghostty                    ~/.config/ghostty
d  kitty                      ~/.config/kitty

# TUI-verktøy
d  lazygit                    ~/.config/lazygit
d  atuin                      ~/.config/atuin
d  tealdeer                   ~/.config/tealdeer
d  tuxedo                     ~/.config/tuxedo
f  superfile/config.toml      ~/Library/Application Support/superfile/config.toml
f  superfile/hotkeys.toml     ~/Library/Application Support/superfile/hotkeys.toml

# AI-agenter
f  cplt/config.toml           ~/.config/cplt/config.toml
f  ai/opencode/opencode.jsonc  ~/.config/opencode/opencode.jsonc
f  ai/opencode/tui.jsonc      ~/.config/opencode/tui.jsonc
d  ai/skills                  ~/.agents/skills
d  ai/skills                  ~/.claude/skills
f  ai/.skill-lock.json        ~/.agents/.skill-lock.json
f  ai/claude/settings.json    ~/.claude/settings.json
f  ai/claude/statusline-command.sh  ~/.claude/statusline-command.sh

# Zen Browser — spesialhåndteres i symlinks.sh (dynamisk profilsti)
